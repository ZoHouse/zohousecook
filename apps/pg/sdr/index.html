<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase | New</title>
    <link
      rel="shortcut icon"
      href="https://static.cdn.zo.xyz/media/zo-v2-dynamic.svg"
      type="image/svg+xml"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./main.css" />
    <script src="./script.js"></script>
  </head>
  <body>
    <main>
      <img src="https://static.cdn.zo.xyz/media/zo-v2-white.svg" alt="Zo" />
      <div id="main-init">
        <h1>Register Display</h1>
        <p>
          Create a new session with the following code to register this display.
        </p>
        <div id="code-box"></div>
        <div class="spacer"></div>
        <div id="main-init-content">
          <span id="loading-text"></span>
          <span class="dots-wrap">
            <span id="loading-dots"></span>
          </span>
        </div>
      </div>
      <div id="main-success">
        <h1>Display Activated</h1>
        <div id="main-success-content">
          <span>Redirecting to Showcase</span>
          <span class="dots-wrap">
            <span id="loading-dots"></span>
          </span>
        </div>
      </div>
    </main>
  </body>
</html>
