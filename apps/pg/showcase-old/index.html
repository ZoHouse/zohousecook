    <style>
      /* @import url("https://unicons.iconscout.com/release/v4.0.0/css/line.css"); */

      .inset-0 {

          bottom: 0px;
          left: 0px;

      }
      .font-sans {

      }

      .relative {

      }
      .items-start {
          align-items: flex-start;

      .flex-col {
          flex-direction: column;
      }
      .flex {

      }
      .z-10 {
          z-index: 10;
      }
      .left-0 {

      }
      .bottom-0 {
          bottom: 0px;
      }
      .absolute {
          position: absolute;
      }
      .h-2 {
          height: 0.5rem;
      }
      .z-10 {
          z-index: 10;
      }
      .top-0 {

      .p-4 {

      .items-center {

      .justify-center {

      .object-contain {

      }
      .w-8 {

      }
      .h-8 {

      .space-x-2 > :not([hidden]) ~ :not([hidden]) {

      }
    </style>
  </head>

  <body>
    <main id="container0">
      <img id="pfp-main" src="https://cdn.zo.xyz/webthree/nft-art/0x7ab2352b1d2e185560494d5e577f9d3c238b78c5/14189.png" alt=""
        class="flex-1 w-full h-full object-cover" />
      <div class="flex-shrink-0 flex bg-zui-black w-full text-zui-white items-start relative py-4">
        <div id="qr-container0" class="qr-cont"></div>
        <div class="flex items-center justify-center flex-shrink-0 flex-1 space-x-2" id="user-twitter">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Twitter-logo.svg/1200px-Twitter-logo.svg.png"
            class="w-8 h-8 object-contain" alt="" />
          <span class="text-lg">@ishaanrawat</span>
        </div>
        <div class="flex items-center justify-center flex-shrink-0 flex-1 space-x-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/01/Ethereum_logo_translucent.svg"
            class="w-8 h-8 object-contain" alt="" />
          <span class="text-lg" id="user-ens">ishaanrawat.eth</span>
        </div>
      </div>
      <div class="absolute top-0 z-10 inset-x-0 h-4"></div>
    </main>
    <main id="container1">
      <img id="pfp-main" src="https://cdn.zo.xyz/webthree/nft-art/0x7ab2352b1d2e185560494d5e577f9d3c238b78c5/14189.png" alt=""
        class="flex-1 w-full h-full object-cover" />
      <div class="flex-shrink-0 flex bg-zui-black w-full text-zui-white items-start relative py-4">
        <div id="qr-container1" class="qr-cont"></div>
        <div class="flex items-center justify-center flex-shrink-0 flex-1 space-x-2" id="user-twitter">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Twitter-logo.svg/1200px-Twitter-logo.svg.png"
            class="w-8 h-8 object-contain" alt="" />
          <span class="text-lg">@ishaanrawat</span>
        </div>
        <div class="flex items-center justify-center flex-shrink-0 flex-1 space-x-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/0/01/Ethereum_logo_translucent.svg"
            class="w-8 h-8 object-contain" alt="" />
          <span class="text-lg" id="user-ens">ishaanrawat.eth</span>
        </div>
      </div>
      <div class="absolute top-0 z-10 inset-x-0 h-4"></div>
    </main>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script>
      const DELAY = 20000;
      
      let progressInterval = null;
      let currentShowcase = null;
      let startTimeStamp = null;
      let showcasesBuffer = [];
      let showIndex = 0;

      const showcaseSecret = localStorage.getItem("zo-showcase-secret");

      if(!showcaseSecret) {
        window.location.href = "https://zo.xyz/pg/sdr";
      }

      const elements = [{
        container: document.querySelector("#container0"),
        pfpMain: document.querySelector("#container0 #pfp-main"),
        userEns: document.querySelector("#container0 #user-ens"),
        userTwitter: document.querySelector("#container0 #user-twitter"),
        progressBar: document.querySelector("#container0 #progress-bar"),
        qrContainer: document.querySelector("#container0 #qr-container0"),
      }, {
        container: document.querySelector("#container1"),
        pfpMain: document.querySelector("#container1 #pfp-main"),
        userEns: document.querySelector("#container1 #user-ens"),
        userTwitter: document.querySelector("#container1 #user-twitter"),
        progressBar: document.querySelector("#container1 #progress-bar"),
        qrContainer: document.querySelector("#container1 #qr-container1"),
      }]

      const fetchNewProfiles = async () => {          
         fetch("https://api.io.zo.xyz/api/v1/showcase/media/", {
            headers: {
              "Authorization": `Bearer ${localStorage.getItem("zo-showcase-secret")}`
            }
          }).then(response => response.json()).then(data => {
            const isInitial = showcasesBuffer.length === 0;            
            if(data.detail === "Invalid session.") {
              window.location.href = "https://zo.xyz/pg/sdr";
            } else {
              showcasesBuffer.push(...data.data);
              console.log("New Showcases loaded:", showcasesBuffer);
              if (isInitial) {
                updateShowcase(showcasesBuffer.shift(), showcasesBuffer[0]);
              }
            }
          }).catch(e =>  {
            console.log(e)
            setTimeout(fetchNewProfiles, 5000);
          });
      }

      const updateShowcase = (showcase, nextShowcase) => {
        // clearInterval(progressInterval)
        startTimeStamp = (Date.now());
        // progressInterval =  setInterval(() => {
        //   elements.progressBar.style.width = `${((Date.now() - startTimeStamp) / DELAY) * 100}%`;
        // }, 0);
        console.log("Updating Showcase:", showcase, nextShowcase);
        if(showIndex === 0) {
          updateHTML(showcase, 0);
          elements[0].container.style.zIndex = 2;
          elements[1].container.style.zIndex = 0;
          updateHTML(nextShowcase, 1);
          showIndex = 1;
        } else {
          updateHTML(showcase, 1);
          elements[1].container.style.zIndex = 2;
          elements[0].container.style.zIndex = 0;
          updateHTML(nextShowcase, 0);
          showIndex = 0;
        }
      }

      const updateHTML = (showcase, elementIndex) => {
        const image = showcase?.pfp_image;
        elements[elementIndex].userEns.innerText = showcase.nickname;
        elements[elementIndex].pfpMain.src = image;
        if(showcase.twitter_handle !== "" && showcase.twitter_handle != null) {
          elements[elementIndex].userTwitter.style.display = "flex";
          elements[elementIndex].userTwitter.querySelector("span").innerText = "@" + showcase.twitter_handle;
          const qrCode = new QRCodeStyling({
            width: 300,
            height: 300,
            type: "svg",
            data: "https://twitter.com/" + showcase.twitter_handle,
            image:
              "https://upload.wikimedia.org/wikipedia/commons/3/39/Logo_of_Twitter%2C_Inc..svg",
            dotsOptions: {
              type: "rounded",
            },
            backgroundOptions: {
              color: "#e9ebee",
            },
            imageOptions: {
              crossOrigin: "anonymous",
              margin: 20,
            },
          });
          if (elements[elementIndex].qrContainer.hasChildNodes()) {
            elements[elementIndex].qrContainer.removeChild(elements[elementIndex].qrContainer.firstChild);
          }
          qrCode.append(elements[elementIndex].qrContainer);
          const qrCodeSVG = elements[elementIndex].qrContainer.querySelector("svg");
          if (qrCodeSVG) {
            qrCodeSVG.setAttribute("viewBox", "0 0 300 300");
            qrCodeSVG.setAttribute("width", "100%");
            qrCodeSVG.setAttribute("height", "100%");
          }
        } else {
          if(elements[elementIndex].qrContainer.hasChildNodes()) {
            elements[elementIndex].qrContainer.removeChild(elements[elementIndex].qrContainer.firstChild);
          }
          elements[elementIndex].userTwitter.style.display = "none";
        }
      }

      const init = async () => {
        await fetchNewProfiles()
        const interval = setInterval(() => {
          updateShowcase(showcasesBuffer.shift(), showcasesBuffer[0]);
          if (showcasesBuffer.length < 2) {
            fetchNewProfiles();
          }
        }, DELAY);
      }
      window.onload = init
    </script>
